<title>PK-12 ELA Curriculum Architecture — CCSS Coverage</title>
<style>
:root{--bg:#0f1b2d;--ink:#1a2433;--mut:#5b6b7f;--line:#dfe5ec;--hi:#2f5596;
--green:#3f9b54;--amber:#d8901a;--red:#c0392b;--grey:#8895a6;--chip:#eef2f7;}
*{box-sizing:border-box}body{margin:0;font:14px/1.45 -apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:#f4f6f9}
header{background:var(--bg);color:#fff;padding:18px 24px}
header h1{margin:0 0 4px;font-size:19px}header p{margin:0;color:#aebfd4;font-size:13px}
.wrap{max-width:1500px;margin:0 auto;padding:18px 24px}
.cards{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 14px;min-width:120px}
.card .n{font-size:22px;font-weight:700}.card .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.bar{height:6px;background:var(--chip);border-radius:3px;margin-top:6px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--hi)}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.controls select,.controls input{padding:7px 9px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff}
.controls input{min-width:220px}
.controls .seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.controls .seg button{border:0;background:#fff;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--mut)}
.controls .seg button.on{background:var(--hi);color:#fff}
table{width:100%;table-layout:fixed;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
col.c-code{width:96px}col.c-grade{width:46px}col.c-text{width:auto}col.c-cov{width:540px}
th,td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top;overflow-wrap:break-word;word-break:normal}
th{background:#eef2f7;position:sticky;top:0;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);cursor:default}
tr:hover{background:#f8fafc}
.code{font-family:ui-monospace,Menlo,monospace;font-weight:600;white-space:nowrap}
.txt{color:var(--ink)}
details.map div{overflow-wrap:break-word}
.muted{color:var(--mut)}.lane{border-left:3px solid var(--hi)}
.chip{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;background:var(--chip);margin:1px 2px 1px 0;white-space:nowrap}
.chip.hi{background:#e3f1e6;color:#256b34}.chip.med{background:#fbf0d8;color:#8a5a08}
.bh{color:var(--red);font-weight:600}.ph{color:var(--grey);font-style:italic}
.inh{color:var(--amber);font-weight:600}
.chip.inhchip{background:#fbf0d8;color:#8a5a08;border:1px dashed #d8901a}
.rup{color:#2f7d8c;font-weight:600}
.chip.rupchip{background:#def0f3;color:#1f6470;border:1px dashed #2f7d8c}
.pcell{font-size:11px}
details.map summary{cursor:pointer;color:var(--hi);font-size:12px}
details.map div{margin:3px 0 3px 8px;padding:5px 8px;background:#f8fafc;border-left:2px solid var(--line);font-size:12px}
.foot{color:var(--mut);font-size:12px;margin-top:14px;line-height:1.6}
.tag{font-size:10px;padding:1px 5px;border-radius:8px;background:#eef2f7;color:var(--mut);text-transform:uppercase}
</style></head><body>

const {rows,summary,gradeOrder,strandOrder}=DATA;
// dashboard cards
const cards=document.getElementById('cards');
function card(n,l,frac){let f=frac!=null?`<div class="bar"><i style="width:${frac}%"></i></div>`:'';
 return `<div class="card"><div class="n">${n}</div><div class="l">${l}</div>${f}</div>`;}
cards.innerHTML =
 card(summary.lane.covered+'/'+summary.lane.total,'In-lane covered (direct+inherited)',Math.round(100*summary.lane.covered/summary.lane.total))
 + card(summary.lane.direct,'In-lane DIRECT')
 + card(summary.lane.inherited,'In-lane inherited (anchor-level)')
 + card(summary.lane.rollup,'In-lane roll-up (all children covered)')
 + card(summary.blackHoles,'In-lane black holes (truly uncovered)')
 + summary.byStrand.map(s=>card(s.covered+'/'+s.total,(s.lane?'★ ':'')+s.strand+' '+s.pct+'%',s.pct)).join('');

summary.platforms.forEach(p=>platSel.innerHTML+=`<option>${p}</option>`);

 b.classList.add('on');laneMode=b.dataset.lane;render();});
['strand','grade','platform','gap','q'].forEach(id=>document.getElementById(id).oninput=render);
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function render(){
 const st=strand.value,gr=grade.value,pf=platform.value,gp=gap.value,q=document.getElementById('q').value.toLowerCase();
 let out=[];let shown=0;
 for(const r of rows){
  if(r.placeholder) continue;
  if(laneMode==='lane'&&!r.lane) continue;
  if(st&&r.strand!==st) continue;
  if(gr&&r.grade!==gr) continue;
  if(pf&&!r.platforms.includes(pf)) continue;
  if(gp==='direct'&&r.state!=='direct') continue;
  if(gp==='inherited'&&r.state!=='inherited') continue;
  if(gp==='rollup'&&r.state!=='rollup') continue;
  if(gp==='black'&&r.state!=='black') continue;
  if(gp==='multi'&&r.platforms.length<2) continue;
  if(gp==='recognition'){const rec=r.maps.length&&r.maps.every(m=>m.assessment_type==='recognition');if(!rec)continue;}
  if(q&&!(r.code.toLowerCase().includes(q)||r.text.toLowerCase().includes(q))) continue;
  shown++;
  let cov;
  if(r.state==='black'){cov='<span class="bh">● black hole</span>';}
  else if(r.state==='inherited'){
     cov='<span class="inh" title="No direct mapping; covered via parent anchor '+esc(r.parent)+'">◐ inherited</span> '

       + `<div class="muted" style="font-size:11px;margin-top:2px">via anchor <span class="code">${esc(r.parent)}</span></div>`;}
  else if(r.state==='rollup'){
     cov='<span class="rup" title="No mapping to this anchor directly, but every sub-standard is covered">◑ roll-up</span> '
       + r.rollup.map(p=>`<span class="chip rupchip" title="covers all sub-standards of ${esc(r.code)}">${esc(p)}</span>`).join('')
       + `<div class="muted" style="font-size:11px;margin-top:2px">all sub-standards covered</div>`;}
  else{cov=r.maps.map(m=>{
     const cc=m.confidence==='high'?'hi':(m.confidence==='medium'?'med':'');
     return `<span class="chip ${cc}" title="${esc(m.alignment_source)} · ${esc(m.assessment_type)} · ${esc(m.status)}">${esc(m.platform)}</span>`;
   }).join('')
   +`<details class="map"><summary>${r.maps.length} mapping(s)</summary>`
   + r.maps.map(m=>`<div><b>${esc(m.platform)}</b> &middot; ${esc(m.confidence)} conf &middot; ${esc(m.alignment_source)}<br>
       ${esc(m.content_type)} / ${esc(m.assessment_type)} / instruction:${esc(m.instruction)} / ${esc(m.status)}<br>
       <span class="muted">${esc(m.course_or_skill)} &mdash; ${esc(m.notes)}</span></div>`).join('')
   +`</details>`;}
  out.push(`<tr class="${r.lane?'lane':''}"><td class="code">${esc(r.code)}</td>
    <td>${esc(r.grade)}</td>
    <td class="txt">${esc(r.text)} <span class="tag">${esc(r.category)}</span></td>
    <td>${cov}</td></tr>`);
 }
 document.getElementById('tb').innerHTML=out.join('');
 document.getElementById('count').textContent=shown+' standards shown';
}
document.getElementById('foot').innerHTML=
 'Coverage states: <b style="color:#2f5596">direct</b> = a platform maps to this exact code &middot; '
 +'<span class="inh">◐ inherited</span> = no direct mapping, but the parent anchor is covered (platform teaches at a coarser grain than this sub-standard) &middot; '
 +'<span class="rup">◑ roll-up</span> = an anchor not mapped directly, but every one of its sub-standards is covered (fully taught in aggregate) &middot; '
 +'<span class="bh">● black hole</span> = neither. '
 +'Confidence: <span class="chip hi">high</span> = vendor-published per-lesson tags; '
 +'<span class="chip med">medium</span> = deterministic domain/category/lesson-name mapping. '
 +'Hover a chip for source &amp; assessment type; expand "mapping(s)" for full provenance. '
 +'★ = in-lane (Language + Reading Foundational). Placeholder CCSS rows (e.g. "Begins in grade 2") excluded from coverage math. '
 +'Source of record: coverage_mappings.csv (regenerate via build_deliverable.py).';
render();
